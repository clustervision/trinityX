include:
  - project: 'ClusterVision/gitlab-cicd-pipelines'
    file: '/trinityx-combined-pipeline.yml'
    # Explicit so it can be swapped to a test branch during troubleshooting.
    ref: 'main'

stages:
  - test

# Controls which distros are tested based on how the pipeline is triggered.
#
# - Nightly schedule  : full matrix (all distros), as before.
# - Branch push / MR  : Rocky 9 only, automatically.
# - Manual trigger    : Rocky 9 by default; override DISTRO_MATRIX in the
#                       "Run pipeline" UI to cherry-pick specific distros,
#                       e.g. "rocky8", "alma9", "rocky8 alma9 rhel9", etc.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      variables:
        RUN_FULL_MATRIX: "true"
    - when: always
      variables:
        RUN_FULL_MATRIX: "false"

default:
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - scheduler_failure
      - api_failure

variables:
  RUN_WEEKLY_EXTRAS: "false"
  RUN_FULL_MATRIX: "false"
  # Shown as a dropdown in the "Run pipeline" UI.
  # On branch pushes/MRs this defaults to rocky9 automatically.
  # On scheduled runs RUN_FULL_MATRIX=true overrides this entirely.
  DISTRO_MATRIX:
    value: "rocky9"
    options:
      - "rocky9"
      - "rocky8"
      - "rocky10"
      - "alma9"
      - "alma8"
      - "alma10"
      - "rhel8"
      - "rhel9"
      - "centos9"
    description: "Distro to test. Ignored on nightly scheduled runs (full matrix runs instead)."
