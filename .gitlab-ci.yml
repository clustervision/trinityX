include:
  - project: 'ClusterVision/gitlab-cicd-pipelines'
    file: '/trinityx-combined-pipeline.yml'
    # Explicit so it can be swapped to a test branch during troubleshooting.
    ref: 'trix-sandbox'

stages:
  - test

default:
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - scheduler_failure
      - api_failure

variables:
  # Keep weekly extra playbooks disabled unless explicitly enabled.
  RUN_WEEKLY_EXTRAS: "false"
  # Run the full 10-OS matrix on every scheduled run.
  RUN_FULL_MATRIX: "true"

# Default to Rocky 9 only for feature branches and MRs
# Full matrix only for nightly scheduled runs
.rules-scheduled-full-matrix: &rules-scheduled-full-matrix
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      variables:
        RUN_FULL_MATRIX: "true"
    - when: always
      variables:
        RUN_FULL_MATRIX: "false"
        DISTRO_MATRIX: "rocky-9"
