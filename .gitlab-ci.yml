include:
  - project: 'ClusterVision/gitlab-cicd-pipelines'
    file: '/trinityx-combined-pipeline.yml'
    # Pin to exact sandbox template commit for deterministic include resolution.
    ref: 'a75eb8eecd9b457f4a05e846404b2c13ee674ea4'

stages:
  - test

default:
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - scheduler_failure
      - api_failure

variables:
  # Keep weekly extra playbooks disabled unless explicitly enabled.
  RUN_WEEKLY_EXTRAS: "false"
  RUN_FULL_MATRIX: "false"
