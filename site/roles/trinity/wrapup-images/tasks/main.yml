---
- block:
  - name: Cleanup the image
    command: yum clean all
    when: ansible_facts['os_family'] == "RedHat"

  - name: Cleanup the image
    command: apt-get clean
    when: ansible_facts['os_family'] == "Debian"

  - name: Cleanup {{ items }}
    command: "rm -f {{ items }}/*"
    with_items:
      - /tmp
      - '{{ trix_tmpdir }}'
    when: 
      - item | length > 0
      - not item in ['/', ' ']
  when: in_image
  tags: always
