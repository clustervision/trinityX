---
- name: Load a variable file based on the OS type, or a default if not found. Using free-form to specify the file.
  include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_distribution }}{{ ansible_distribution_major_version}}.yaml"
    - "{{ ansible_os_family }}{{ ansible_distribution_major_version}}.yaml"
    - "{{ ansible_distribution }}.yaml"
    - "{{ ansible_os_family }}.yaml"
  no_log: true
  ignore_errors: true
  when: not is_airgap | default(False)

- block:
  - name: Set airgap distribution repo
    set_fact:
      ag_repo: "{{ ansible_distribution }}-{{ ansible_distribution_major_version }}"

  - debug:
      msg: "Airgap repo location: {{ ag_repo }}"
  when:
    - is_airgap | default(False)
    - ag_repo is not defined

- name: Load a variable file based on the OS type, or a default if not found. Using free-form to specify the file. Airgap.
  include_vars: "{{ item }}"
  with_first_found:
    - "airgap/{{ ansible_distribution }}{{ ansible_distribution_major_version}}.yaml"
    - "airgap/{{ ansible_os_family }}{{ ansible_distribution_major_version}}.yaml"
    - "airgap/{{ ansible_distribution }}.yaml"
    - "airgap/{{ ansible_os_family }}.yaml"
    - "airgap/main.yaml"
  no_log: true
  ignore_errors: true
  when: is_airgap | default(False)

- block:
  - name: Rebuild RPM DB
    shell: "rpm --rebuilddb"
    ignore_errors: true

  - name: Configure TrinityX repos
    ansible.builtin.yum_repository:
      name: "{{ item.name }}"
      description: "{{ item.name }}"
      baseurl: "{{ item.repo }}"
      gpgcheck: "{{ item.gpgcheck | default(False) }}"
      gpgkey: "file://{{ item.gpgkey | default('') }}"
      enabled: "{{ item.enabled | default(True) }}"
      reposdir: "{{ params.install_root + '/etc/yum.repos.d/' if params.install_root is defined else '/etc/yum.repos.d' }}"
    with_items: "{{ trinityx_repositories }}"
    when: item.name is defined

  - name: Configure gpg keys for TrinityX repos
    copy:
      dest: "{{ item.gpgkey }}"
      content: "{{ item.gpgdata }}"
    with_items: "{{ trinityx_repositories }}"
    when: item.gpgkey is defined and item.gpgdata is defined

  - name: Install dnf config manager plugin
    package: 
      name: dnf-command(config-manager)
      state: present
      use: dnf
    ignore_errors: true

  # - name: Add GPG keys to RPM DB. normally NOT needed - Antoine
  #   ansible.builtin.rpm_key:
  #     state: present
  #     key: "{{ item.gpgkey | default('') }}"
  #   with_items: "{{ trinityx_repositories }}"
  #   ignore_errors: True

  - name: Install external repo RPMS
    dnf:
      name: "{{ item.name }}"
      disable_gpg_check: "{{ item.no_gpgcheck | default(False) }}"
      state: present
      update_cache: true
      installroot: "{{ params.install_root if params.install_root is defined else '/' }}"
    retries: "{{ rpm_retries | default(3) }}"
    delay: "{{ rpm_delay | default(15) }}"
    with_items: "{{ external_repository_rpms }}"
    when: item.name is defined
#    notify:
#      - Disable repos
#      - Mend repos
#      - Use baseurl
#
#  - meta: flush_handlers

  # Notify doesn't work inside chroot.... sigh..
  - ansible.builtin.include_tasks:
      file: mangling.yml
    when: external_repository_rpms | default({}) | length > 0

  - name: Install external repo Packages
    dnf:
      name: "{{ item.name }}"
      disable_gpg_check: "{{ item.no_gpgcheck | default(False) }}"
      state: present
      update_cache: true
      installroot: "{{ params.install_root if params.install_root is defined else '/' }}"
    retries: "{{ rpm_retries | default(3) }}"
    delay: "{{ rpm_delay | default(15) }}"
    with_items: "{{ package_based_repositories }}"
    when: item.name is defined
#    notify:
#      - Disable repos
#      - Mend repos
#      - Use baseurl
#
#  - meta: flush_handlers

  - ansible.builtin.include_tasks:
      file: mangling.yml
    when: package_based_repositories | default({}) | length > 0

  - name: Configure custom repos
    ansible.builtin.yum_repository:
      name: "{{ item.name }}"
      description: "{{ item.name }}"
      baseurl: "{{ item.repo }}"
      enabled: "{{ item.enabled | default(True) }}"
      gpgcheck: "{{ item.gpgcheck | default(False) }}"
      gpgkey: "file://{{ item.gpgkey | default('') }}"
      reposdir: "{{ params.install_root + '/etc/yum.repos.d/' if params.install_root is defined else '/etc/yum.repos.d' }}"
    with_items: "{{ custom_repositories }}"
    when: item.name is defined

  - name: Configure gpg keys for custom repos
    copy:
      dest: "{{ item.gpgkey }}"
      content: "{{ item.gpgdata }}"
    with_items: "{{ custom_repositories }}"
    when: item.gpgkey is defined and item.gpgdata is defined

  - name: Make caches
    shell: "dnf makecache -y"
    ignore_errors: true

  when: ansible_facts['os_family'] == "RedHat"
  tags: install-only

