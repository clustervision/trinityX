---

BLADIEBLA: "yesyesyes"

package_based_repositories: {}
use_baseurl_repositories: []
custom_repositories: {}

trinityx_repositories:
  - name: BaseOS
    repo: https://{{ ag_server }}/repos/rhel-9-for-x86_64-baseos-rpms
    gpgcheck: False
  - name: AppStream
    repo: https://{{ ag_server }}/repos/rhel-9-for-x86_64-appstream-rpms
    gpgcheck: False
  - name: crb
    repo: https://{{ ag_server }}/repos/codeready-builder-for-rhel-9-x86_64-rpms
    gpgcheck: False
  - name: epel
    repo: https://{{ ag_server }}/repos/epel
    gpgcheck: False
  - name: highavailability
    repo: https://{{ ag_server }}/repos/rhel-9-for-x86_64-highavailability-rpms
    gpgcheck: False
  - name: trix
    repo: https://{{ ag_server }}/trinityx/{{ trix_version }}/os/{{ hostvars[inventory_hostname].ansible_distribution|lower }}/{{ hostvars[inventory_hostname].ansible_distribution_major_version }}/{{ system_arch }}
    gpgcheck: False
  - name: luna2
    repo: https://{{ ag_server }}/trinityx/{{ trix_version }}/luna2/{{ hostvars[inventory_hostname].ansible_distribution|lower }}/{{ hostvars[inventory_hostname].ansible_distribution_major_version }}/{{ system_arch }}
    gpgcheck: False
  - name: luna2-noarch
    repo: https://{{ ag_server }}/trinityx/{{ trix_version }}/luna2/noarch/rpms
    gpgcheck: False

external_repository_rpms:
  - name: https://{{ ag_server }}/trinityx/{{ trix_version }}/additional/noarch/rpms/elrepo-release-{{ hostvars[inventory_hostname].ansible_distribution_major_version }}.el{{ hostvars[inventory_hostname].ansible_distribution_major_version }}.elrepo.noarch.rpm
    file: elrepo-release.rpm
    no_gpgcheck: True
