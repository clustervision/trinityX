---
# App icon copy and manifest update - must run AFTER ood-apps (app dirs are created there)
# Included via controller.yml after trinity/ood-apps role

- name: Copy TrinityX OOD app icons to system apps
  ansible.builtin.copy:
    src: "branding/TrinityX/app-icons/{{ item.src }}"
    dest: "/var/www/ood/apps/sys/{{ item.app }}/icon.png"
    mode: "0644"
    owner: root
    group: root
  loop: "{{ trinityx_ood_app_icons | default([]) }}"
  when: ood_brand == "TrinityX"
  notify: Run update_ood
  tags:
    - ood
    - branding
    - ood-app-icons

- name: Ensure TrinityX OOD app manifests use icon.png
  ansible.builtin.lineinfile:
    path: "/var/www/ood/apps/sys/{{ item.app }}/manifest.yml"
    regexp: "^icon:"
    line: "icon: /icon.png"
    create: no
  loop: "{{ trinityx_ood_app_icons | default([]) }}"
  when: ood_brand == "TrinityX"
  notify: Run update_ood
  tags:
    - ood
    - branding
    - ood-app-icons
