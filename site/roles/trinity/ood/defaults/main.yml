---
# vars file for ood-portal

ood_rpms:
  - name: epel-release
  - name: https://yum.osc.edu/ondemand/4.0/ondemand-release-web-4.0-1.el{{ ansible_distribution_major_version }}.noarch.rpm
    no_gpgcheck: true
  - name: ["@nodejs:20", "@ruby:3.3", "ondemand", "luna2-python"]

ood_dex_rpms:
  - name: ondemand-dex

ood_pam_rpms:
  - name: mod_authnz_pam

ood_port: 8080
ood_user: apache
ood_cfg_path: /etc/ood/config/
ood_brand: TrinityX
ood_auth_provider: dex # 'pam' or 'dex' ( only openldap is configured for dex )
ood_cluster_name: TrinityX
ood_login_host: localhost
ood_ldap_host: localhost
ood_enable_ssl: true

ood_footer_dir: "/etc/ood/config/apps/dashboard/views/layouts"
ood_footer_file: "_footer.html.erb"
ood_admin_group: admins

# Optional: custom logo and text in dashboard welcome area (TrinityX branding)
# Set these in group_vars or extra vars to replace the grey placeholders.
# trinityx_custom_logo_url: "https://example.com/logo.png"   # URL to logo image (shown in circle)
# trinityx_custom_welcome_text: "Your custom message here"  # Shown in the dark grey box
trinityx_custom_logo_url: ""
trinityx_custom_welcome_text: ""

# Optional: TrinityX OOD app icons
# Mapping from OOD app directory name (under /var/www/ood/apps/sys/)
# to the icon file shipped in files/branding/TrinityX/app-icons.
# - app: app directory name on the OOD node
# - src: icon file name in app-icons/ (SVG/PNG)
# Adjust "app" values to match your site, or override this list in group_vars.
trinityx_ood_app_icons:
  - { app: "alertmanager",  src: "alertmanager.svg" }
  - { app: "alertx",        src: "alertx.svg" }
  - { app: "bmc-setup",     src: "bmc-setup.svg" }
  - { app: "cluster",       src: "cluster.svg" }
  - { app: "code-server",   src: "code-server.svg" }
  - { app: "control",       src: "control.svg" }
  - { app: "desktop",       src: "desktop.svg" }
  - { app: "dns",           src: "dns.svg" }
  - { app: "groups",        src: "groups.svg" }
  - { app: "infiniband",    src: "infiniband.svg" }
  - { app: "luna",          src: "luna.svg" }
  - { app: "monitoring",    src: "monitoring.svg" }
  - { app: "network",       src: "network.svg" }
  - { app: "nodes",         src: "nodes.svg" }
  - { app: "os-images-tags",src: "os-images-tags.svg" }
  - { app: "os-images",     src: "os-images.svg" }
  - { app: "other-devices", src: "other-devices.svg" }
  - { app: "psswd",         src: "psswd.svg" }
  - { app: "rack",          src: "rack.svg" }
  - { app: "secrets",       src: "secrets.svg" }
  - { app: "service",       src: "service.svg" }
  - { app: "shell",         src: "shell.svg" }
  - { app: "switch",        src: "switch.svg" }
  - { app: "users",         src: "users.svg" }
