---
# vars file for ood-portal

ood_rpms:
  - name: epel-release
  - name: https://yum.osc.edu/ondemand/4.1/ondemand-release-web-4.1-1.el{{ ansible_distribution_major_version }}.noarch.rpm
    no_gpgcheck: true
  - name: ["@nodejs:20", "@ruby:3.3", "ondemand", "luna2-python"]

ood_dex_rpms:
  - name: ondemand-dex

ood_pam_rpms:
  - name: mod_authnz_pam

ood_port: 8080
ood_user: apache
ood_cfg_path: /etc/ood/config/
ood_brand: TrinityX
ood_auth_provider: dex # 'pam' or 'dex' ( only openldap is configured for dex )
ood_cluster_name: TrinityX
ood_login_host: localhost
ood_ldap_host: localhost
ood_enable_ssl: true

ood_footer_dir: "/etc/ood/config/apps/dashboard/views/layouts"
ood_footer_file: "_footer.html.erb"
ood_admin_group: admins

# Optional: custom logo and text in dashboard welcome area (TrinityX branding)
# Set these in group_vars or extra vars to replace the grey placeholders.
# trinityx_custom_logo_url: "https://example.com/logo.png"   # URL to logo image (shown in circle)
# trinityx_custom_welcome_text: "Your custom message here"  # Shown in the dark grey box
trinityx_custom_logo_url: ""
trinityx_custom_welcome_text: ""

# Optional: TrinityX OOD app icons
# Mapping from OOD app directory name (under /var/www/ood/apps/sys/)
# to the icon file shipped in files/branding/TrinityX/app-icons.
# - app: app directory name on the OOD node
# - src: icon file name in app-icons/ (SVG/PNG)
# Adjust "app" values to match your site, or override this list in group_vars.
trinityx_ood_app_icons:
  - { app: "alertmanager",    src: "alert-manager.png" }
  - { app: "bc_codeserver",   src: "code-server.png" }
  - { app: "trinity_control", src: "control.png" }
  - { app: "bc_desktop",      src: "desktop.png" }
  - { app: "shell",           src: "shell.png" }
  - { app: "prometheus",      src: "prometheus.png" }
  - { app: "grafana",         src: "grafana.png" }
  - { app: "bc_jupyter",         src: "jupyter.png" }

  - { app: "trinity_alertx",  src: "alertx.png" }
  - { app: "trinity_bmcsetup",src: "bmc-setup.png" }
  - { app: "trinity_cluster", src: "cluster.png" }
  - { app: "trinity_dns",     src: "dns.png" }
  - { app: "trinity_group",   src: "groups.png" }
  - { app: "trinity_infiniband", src: "infiniband.png" }
  - { app: "trinity_monitor", src: "monitoring.png" }
  - { app: "trinity_network", src: "network.png" }
  - { app: "trinity_node",    src: "nodes.png" }
  - { app: "trinity_osimagetag", src: "os-images-tags.png" }
  - { app: "trinity_osimage", src: "os-images.png" }
  - { app: "trinity_otherdev",src: "other-devices.png" }
  - { app: "trinity_passwd",  src: "passwd.png" }
  - { app: "trinity_rack",    src: "rack.png" }
  - { app: "trinity_secrets", src: "secrets.png" }
  - { app: "trinity_service", src: "service.png" }
  - { app: "trinity_switch",  src: "switch.png" }
  - { app: "trinity_users",   src: "users.png" }
  - { app: "trinity_slurm",   src: "slurm.png" }

