---

ood_apps:
  
  - name: jupyter
    type: bc
    node_rpms:
      - name: [python3.13, python3.13-pip]
    node_apts:
      - name: [python3, python3-pip, python3-venv]
    icon: jupyter.png
  
  - name: codeserver
    type: bc
    node_rpms:
      - name: "https://github.com/coder/code-server/releases/download/v4.89.0/code-server-4.89.0-{{ ood_apps_arch }}.rpm"
        no_gpgcheck: true
    node_apts:
      - name: "https://github.com/coder/code-server/releases/download/v4.89.0/code-server_4.89.0_{{ ood_apps_arch }}.deb"
    icon: code-server.png
  
  - name: desktop
    override: true
    type: bc
    props:
      idle_timeout: 3600
      desktops:
        - kde
      desktops_default: kde
    node_rpms:
    - name: https://yum.osc.edu/ondemand/4.1/ondemand-release-compute-4.1-1.el{{ ansible_distribution_major_version }}.noarch.rpm
      no_gpgcheck: true
    - name: ["turbovnc", "python3-websockify", "dbus-x11", "@KDE"]
      enablerepo: crb
    tasks: ["desktop.yml"]
    icon: desktop.png

  - name: bmcsetup
    type: trinity
    mode: "0750"
    icon: bmc-setup.png
  - name: cluster
    type: trinity
    mode: "0750"
    icon: cluster.png
  - name: group
    type: trinity
    mode: "0750"
    icon: groups.png
    tasks: ["group.yml"]
  - name: network
    type: trinity
    mode: "0750"
    icon: network.png
  - name: node
    type: trinity
    mode: "0750"
    icon: nodes.png
    tasks: ["node.yml"]
  - name: osimage
    type: trinity
    mode: "0750"
    icon: os-images.png
  - name: otherdev
    type: trinity
    mode: "0750"
    icon: other-devices.png
  - name: secrets
    type: trinity
    mode: "0750"
    icon: secrets.png
  - name: service
    type: trinity
    mode: "0750"
    icon: service.png
  - name: switch
    type: trinity
    mode: "0750"
    icon: switch.png
  - name: control
    type: trinity
    mode: "0750"
    icon: control.png
  - name: users
    type: trinity
    mode: "0750"
    icon: users.png
  - name: osimagetag
    type: trinity
    mode: "0750"
    icon: os-images-tags.png
  - name: monitor
    type: trinity
    mode: "0750"
    icon: monitoring.png
  - name: dns
    type: trinity
    mode: "0750"
    icon: dns.png
  - name: slurm
    type: trinity
    mode: "0750"
    icon: slurm.png
  - name: infiniband
    type: trinity
    mode: "0750"
    tasks: ["infiniband.yml"]
    icon: infiniband.png
  - name: rack
    type: trinity
    icon: rack.png
    mode: "0750"
    tasks: ["rack.yml"]
  - name: alertx
    type: trinity
    mode: "0750"
    tasks: ["alertx.yml"]
    icon: alertx.png
  - name: passwd
    type: trinity
    mode: "0755"
    tasks: ["passwd.yml"]
    icon: passwd.png
  - name: system-status
    mode: "0000"
  - name: shell
    override: true
    mode: "0750"
    props:
      lchroot_wrapper_path: /usr/local/sbin/ood_lchroot_wrapper
    tasks: ["lchroot.yml"]
    icon: shell.png

  - name: prometheus
    icon: prometheus.png
  - name: alertmanager
    mode: "0750"
    icon: alert-manager.png
  - name: grafana
    icon: grafana.png
