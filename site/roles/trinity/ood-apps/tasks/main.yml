---

- name: Initialize OOD app variable layers
  ansible.builtin.set_fact:
    ood_apps_os_vars: {}
    ood_apps_airgap_main_vars: {}
    ood_apps_airgap_vars: {}
    ood_apps: []
    ood_apps_is_airgap: "{{ is_airgap | default(False) }}"

- name: Load OS-specific OOD app overrides
  ansible.builtin.include_vars:
    file: "{{ lookup('ansible.builtin.first_found', ood_apps_os_var_params, errors='ignore') }}"
    name: ood_apps_os_vars
  vars:
    ood_apps_os_var_params:
      files:
        - "{{ ansible_distribution }}{{ ansible_distribution_version}}.yaml"
        - "{{ ansible_distribution }}{{ ansible_distribution_major_version}}.yaml"
        - "{{ ansible_os_family }}{{ ansible_distribution_major_version}}.yaml"
      paths:
        - vars
  no_log: true
  when: (lookup('ansible.builtin.first_found', ood_apps_os_var_params, errors='ignore') | default('')) | length > 0

- name: Load generic airgap OOD app overrides
  ansible.builtin.include_vars:
    file: "vars/airgap/main.yaml"
    name: ood_apps_airgap_main_vars
  no_log: true
  when:
    - ood_apps_is_airgap

- name: Load airgap OOD app overrides
  ansible.builtin.include_vars:
    file: "{{ lookup('ansible.builtin.first_found', ood_apps_airgap_var_params, errors='ignore') }}"
    name: ood_apps_airgap_vars
  vars:
    ood_apps_airgap_var_params:
      files:
        - "{{ ansible_distribution }}{{ ansible_distribution_version}}.yaml"
        - "{{ ansible_distribution }}{{ ansible_distribution_major_version}}.yaml"
        - "{{ ansible_os_family }}{{ ansible_distribution_major_version}}.yaml"
        - "{{ ansible_distribution }}.yaml"
        - "{{ ansible_os_family }}.yaml"
        - main.yaml
      paths:
        - vars/airgap
  no_log: true
  when:
    - ood_apps_is_airgap
    - (lookup('ansible.builtin.first_found', ood_apps_airgap_var_params, errors='ignore') | default('')) | length > 0

- name: Merge OOD app model
  ansible.builtin.set_fact:
    ood_apps_catalog_merged: >-
      {{
        ood_apps_catalog
        | combine((ood_apps_os_vars.ood_apps_catalog | default({})) if not ood_apps_is_airgap else {}, recursive=True)
        | combine((ood_apps_airgap_main_vars.ood_apps_catalog | default({})) if ood_apps_is_airgap else {}, recursive=True)
        | combine((ood_apps_airgap_vars.ood_apps_catalog | default({})) if ood_apps_is_airgap else {}, recursive=True)
      }}
    ood_apps_overrides_merged: >-
      {{
        ood_apps_overrides
        | combine((ood_apps_os_vars.ood_apps_overrides | default({})) if not ood_apps_is_airgap else {}, recursive=True)
        | combine((ood_apps_airgap_main_vars.ood_apps_overrides | default({})) if ood_apps_is_airgap else {}, recursive=True)
        | combine((ood_apps_airgap_vars.ood_apps_overrides | default({})) if ood_apps_is_airgap else {}, recursive=True)
      }}
    ood_apps_remove_merged: >-
      {{
        ood_apps_remove
        | combine((ood_apps_os_vars.ood_apps_remove | default({})) if not ood_apps_is_airgap else {}, recursive=True)
        | combine((ood_apps_airgap_main_vars.ood_apps_remove | default({})) if ood_apps_is_airgap else {}, recursive=True)
        | combine((ood_apps_airgap_vars.ood_apps_remove | default({})) if ood_apps_is_airgap else {}, recursive=True)
      }}
    ood_apps_enabled_seed: >-
      {{
        (ood_apps_airgap_vars.ood_apps_enabled_default | default(ood_apps_airgap_main_vars.ood_apps_enabled_default | default(ood_apps_enabled_default)))
        if ood_apps_is_airgap
        else (ood_apps_os_vars.ood_apps_enabled_default | default(ood_apps_enabled_default))
      }}
    ood_luna_apps_url: >-
      {{
        (ood_apps_airgap_vars.ood_apps_meta.ood_luna_apps_url | default(ood_apps_airgap_main_vars.ood_apps_meta.ood_luna_apps_url | default(ood_luna_apps_url)))
        if ood_apps_is_airgap
        else (ood_apps_os_vars.ood_apps_meta.ood_luna_apps_url | default(ood_luna_apps_url))
      }}

- name: Resolve final OOD app order
  ansible.builtin.set_fact:
    ood_apps_enabled_resolved: >-
      {{
        (
          ood_apps_enabled
          if (ood_apps_enabled is defined)
          else (ood_apps_enabled_seed + (ood_apps_catalog_merged.keys() | list) + (ood_apps_overrides_merged.keys() | list))
        ) | unique
      }}

- name: Materialize final OOD app list
  ansible.builtin.set_fact:
    ood_apps: >-
      {{
        ood_apps + [
          (
            {'name': item}
            | combine(ood_apps_catalog_merged[item] | default({}), recursive=True)
            | combine(ood_apps_overrides_merged[item] | default({}), recursive=True)
            | dict2items
            | rejectattr('key', 'in', ood_apps_remove_merged[item] | default([]))
            | items2dict
          )
        ]
      }}
  loop: "{{ ood_apps_enabled_resolved }}"

- name: Include tasks for login image
  ansible.builtin.include_tasks:
    file: login-pre.yml

- name: Download and link trinity apps
  ansible.builtin.include_tasks:
    file: trinity.yml

- name: Run apps tasks
  ansible.builtin.include_tasks:
    file: app.yml
  loop: "{{ ood_apps }}"
  loop_control:
    loop_var: app

- name: Include tasks for login image
  ansible.builtin.include_tasks:
    file: login-post.yml
