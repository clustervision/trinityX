---
# Ubuntu login image wrapper.
#
# This mirrors the structure of login-default.yml, but uses the Ubuntu
# image creation/setup flow from compute-ubuntu.yml.
#
# Note: full login-default parity for Ubuntu still requires Ubuntu support in
# the trinity/ood and trinity/slurm roles. Today this playbook renders the
# Ubuntu login-image entrypoint, while the role-level OOD/slurm work remains
# a follow-up.

- hosts: localhost
  pre_tasks:
  #
  # the image name can be set in the below fact.
  #
  - name: Set image name
    set_fact:
      image_name: "login-ubuntu-image"
    tags: always

- import_playbook: imports/trinity-ubuntu-image-create.yml
  vars:
    image_name: "{{ hostvars['localhost']['image_name'] }}"
    # The password to set up for the root user in the image.
    # If empty, it will be generated at random.
    #
    image_password:
    #
    # Alternative distribution build. Supported are Ubuntu, version 20, 22 and 24
    # or any docker image, e.g. ubuntu:rolling
    #alternative_distribution: Ubuntu-22
    # 
    # The alternative source can be 'base' or 'docker'
    #alternative_image_source: 'base'

- import_playbook: imports/trinity-ubuntu-login-setup.yml
  vars:
    hostlist: "{{ hostvars['localhost']['image_name'] }}.osimages.luna"
    in_login_image: true
  tags: build

- hosts:
    - "{{ hostvars['localhost']['image_name'] }}.osimages.luna"
  roles:
    - role: trinity/slurm
      slurm_conf_path: '{{ trix_shared }}/etc/slurm'
      slurm_spool_path: '{{ trix_shared }}/var/spool/slurm'
      munge_conf_path: '{{ trix_shared }}/etc/munge'
      enable_slurm_pam: false
      when: "'slurm' in workload_manager "
      tags: slurm

- hosts: controllers
  roles:
    - role: luna/osimage-pack
      vars:
         params:
            image_name: "{{ hostvars['localhost']['image_name'] }}"
      tags: pack-images
